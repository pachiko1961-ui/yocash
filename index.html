<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物商城完整版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微軟正黑體,sans-serif;}
        body{background:#f6f7f9;padding-top:70px;}
        .hide{display:none !important;}
        .container{max-width:1250px;margin:0 auto;padding:0 15px;}
        .header{position:fixed;top:0;left:0;width:100%;background:#165DFF;color:#fff;height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 25px;z-index:999;}
        .nav-logo{font-size:22px;font-weight:bold;cursor:pointer;}
        .nav-menu{display:flex;gap:25px;align-items:center;}
        .nav-item{cursor:pointer;font-size:15px;}
        .nav-item:hover{opacity:0.85;}
        .admin-btn{background:#fff;color:#165DFF;padding:6px 14px;border-radius:4px;font-weight:bold;}
        .cart-badge{position:relative;}
        .cart-num{position:absolute;top:-8px;right:-10px;background:#f53f3f;border-radius:50%;width:20px;height:20px;font-size:12px;display:flex;align-items:center;justify-content:center;}
        .cate-wrap{display:flex;flex-wrap:wrap;gap:10px;margin:30px 0;}
        .cate-tag{border:1px solid #ccc;padding:7px 15px;border-radius:3px;cursor:pointer;}
        .cate-tag:hover{background:#165DFF;color:#fff;border-color:#165DFF;}
        .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:22px;}
        .product-card{background:#fff;border-radius:6px;box-shadow:0 2px 8px #0001;padding:15px;}
        .product-img{width:100%;height:165px;object-fit:cover;border-radius:4px;background:#eee;}
        .product-name{font-weight:bold;margin:10px 0 5px;}
        .product-cate{font-size:13px;color:#777;}
        .product-price{color:#f53f3f;font-size:18px;font-weight:bold;margin:8px 0;}
        .add-cart{width:100%;background:#165DFF;color:#fff;border:none;padding:9px;border-radius:4px;margin-top:10px;cursor:pointer;}
        .cart-empty{text-align:center;padding:80px 0;color:#999;}
        .cart-empty i{font-size:55px;margin-bottom:15px;}
        .cart-item{background:#fff;padding:15px;border-radius:6px;margin-bottom:12px;display:flex;align-items:center;gap:15px;}
        .cart-img{width:80px;height:80px;object-fit:cover;border-radius:4px;background:#eee;}
        .num-btn{width:28px;height:28px;border:1px solid #ddd;background:#fff;cursor:pointer;}
        .total-bar{background:#fff;padding:18px;border-radius:6px;margin-top:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
        .checkout{background:#165DFF;color:#fff;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;}
        .clear-cart{background:#f53f3f;color:#fff;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;}
        .force-clear-cart{background:#900;color:#fff;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;margin-bottom:15px;}
        .admin-tab{display:flex;gap:12px;border-bottom:1px solid #eee;padding-bottom:12px;margin:25px 0;}
        .tab-btn{padding:8px 18px;border:none;border-radius:4px;background:#eee;cursor:pointer;}
        .tab-btn.active{background:#165DFF;color:#fff;}
        .flex-row{display:flex;justify-content:space-between;align-items:center;margin:15px 0;}
        .add-btn{background:#00b42a;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;}
        table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden;}
        th,td{padding:13px;text-align:left;border-bottom:1px solid #f1f1f1;}
        th{background:#f5f7fa;}
        .edit{color:#165DFF;border:none;background:none;cursor:pointer;margin-right:10px;}
        .del{color:#f53f3f;border:none;background:none;cursor:pointer;}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:1000;}
        .modal-box{background:#fff;width:92%;max-width:500px;padding:22px;border-radius:6px;max-height:90vh;overflow-y:auto;}
        .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
        .close{font-size:22px;cursor:pointer;}
        .input-box{width:100%;border:1px solid #ddd;padding:11px;border-radius:4px;margin:9px 0;}
        .submit-btn{width:100%;background:#165DFF;color:#fff;border:none;padding:11px;border-radius:4px;margin-top:8px;cursor:pointer;}
    </style>
</head>
<body>

<div class="header">
    <div class="nav-logo" onclick="switchPage('home')"><i class="fa fa-shopping-bag"></i> 購物商城</div>
    <div class="nav-menu">
        <span class="nav-item" onclick="switchPage('home')">首頁</span>
        <span class="nav-item cart-badge" onclick="openCart()">
            購物車
            <span class="cart-num" id="cartCount">0</span>
        </span>
        <span class="nav-item" id="regBtn" onclick="openRegModal()">註冊</span>
        <span class="nav-item" id="loginBtn" onclick="openLoginModal()">登入</span>
        <span class="nav-item" id="userText" style="display:none;"></span>
        <span class="nav-item admin-btn" id="adminEntrance" style="display:none;" onclick="switchPage('admin')">商家後台</span>
    </div>
</div>

<div class="container">
    <div id="page-home" class="page-view">
        <div class="cate-wrap" id="cateHtml"></div>
        <h3 style="margin:10px 0;font-size:18px;">全部商品</h3>
        <div class="product-grid" id="productHtml"></div>
    </div>

    <div id="page-cart" class="page-view hide">
        <h2 style="margin:20px 0;font-size:22px;">我的購物車</h2>
        <button class="force-clear-cart" onclick="clearAllLocalCart()">⚠️ 強制清空全部購物車</button>
        <div class="cart-empty" id="cartEmptyTip">
            <i class="fa fa-shopping-cart"></i>
            <p>購物車暫無任何商品</p>
        </div>
        <div id="cartListBox"></div>
    </div>

    <div id="page-admin" class="page-view hide">
        <div class="admin-tab">
            <button class="tab-btn active" onclick="adminTabChange('goods',this)">商品管理</button>
            <button class="tab-btn" onclick="adminTabChange('category',this)">分類管理</button>
            <button class="tab-btn" onclick="adminTabChange('order',this)">訂單管理</button>
        </div>
        <div id="admin-goods" class="admin-content">
            <div class="flex-row">
                <h3>商品列表</h3>
                <button class="add-btn" onclick="openAddProduct()">新增商品</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>圖片</th>
                        <th>商品名稱</th>
                        <th>所屬分類</th>
                        <th>售價</th>
                        <th>庫存</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="adminProductBody"></tbody>
            </table>
        </div>
        <div id="admin-category" class="admin-content hide">
            <div class="flex-row">
                <h3>分類列表</h3>
                <button class="add-btn" onclick="openAddCategory()">新增分類</button>
            </div>
            <div id="adminCateBody"></div>
        </div>
        <div id="admin-order" class="admin-content hide">
            <h3 style="margin-bottom:15px;">全部訂單</h3>
            <table>
                <thead>
                    <tr>
                        <th>訂單編號</th>
                        <th>會員信箱</th>
                        <th>訂單金額</th>
                        <th>訂單狀態</th>
                        <th>下單時間</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="adminOrderBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="regModal" class="modal hide">
    <div class="modal-box">
        <div class="modal-head">
            <h3>會員註冊</h3>
            <span class="close" onclick="closeModal('regModal')"><i class="fa fa-times"></i></span>
        </div>
        <input class="input-box" type="email" id="regEmail" placeholder="請輸入電子信箱">
        <input class="input-box" type="password" id="regPwd" placeholder="請設定登入密碼">
        <button class="submit-btn" onclick="userRegister()">立即註冊</button>
        <p style="text-align:center;margin-top:12px;">已有帳號? <span style="color:#165DFF;cursor:pointer;" onclick="closeModal('regModal');openLoginModal()">前往登入</span></p>
    </div>
</div>

<div id="loginModal" class="modal hide">
    <div class="modal-box">
        <div class="modal-head">
            <h3>會員登入</h3>
            <span class="close" onclick="closeModal('loginModal')"><i class="fa fa-times"></i></span>
        </div>
        <input class="input-box" type="email" id="loginEmail" placeholder="輸入註冊信箱">
        <input class="input-box" type="password" id="loginPwd" placeholder="輸入登入密碼">
        <button class="submit-btn" onclick="userLogin()">立即登入</button>
    </div>
</div>

<div id="productModal" class="modal hide">
    <div class="modal-box">
        <div class="modal-head">
            <h3 id="prodModalTitle">新增商品</h3>
            <span class="close" onclick="closeModal('productModal')"><i class="fa fa-times"></i></span>
        </div>
        <input type="hidden" id="editProductId">
        <label>商品名稱</label>
        <input class="input-box" id="prodName">
        <label>選擇分類</label>
        <select class="input-box" id="prodCateSelect"></select>
        <label>商品售價</label>
        <input class="input-box" type="number" id="prodPrice">
        <label>庫存數量</label>
        <input class="input-box" type="number" id="prodStock">
        <label>商品圖片網址</label>
        <input class="input-box" id="prodImgUrl">
        <label>商品簡介</label>
        <textarea class="input-box" id="prodDesc" rows="3"></textarea>
        <button class="submit-btn" onclick="saveProductInfo()">儲存資料</button>
    </div>
</div>

<div id="categoryModal" class="modal hide">
    <div class="modal-box">
        <div class="modal-head">
            <h3 id="cateModalTitle">新增分類</h3>
            <span class="close" onclick="closeModal('categoryModal')"><i class="fa fa-times"></i></span>
        </div>
        <input type="hidden" id="editCateId">
        <input class="input-box" id="cateNameInput" placeholder="輸入分類名稱">
        <button class="submit-btn" onclick="saveCategoryInfo()">儲存</button>
    </div>
</div>

<div id="orderDetailModal" class="modal hide">
    <div class="modal-box">
        <div class="modal-head">
            <h3>訂單詳細明細</h3>
            <span class="close" onclick="closeModal('orderDetailModal')"><i class="fa fa-times"></i></span>
        </div>
        <div id="orderDetailContent"></div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://zexwhzgxunfnbschkizq.supabase.co";
const SUPABASE_KEY = "sb_publishable_OPftLOAUJFzwKZ8eK7GIXg_2LEEMMwn";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const DEF_IMG = "https://picsum.photos/300/300";
const DEF_SMALL = "https://picsum.photos/100/100";

// ========== 購物車完整邏輯 ==========
function getCartData(){
    let cart = localStorage.getItem("shopCartData");
    if(!cart) return [];
    try{
        return JSON.parse(cart);
    }catch{
        return [];
    }
}
function setCartData(arr){
    localStorage.setItem("shopCartData",JSON.stringify(arr));
    updateCartNum();
}
function updateCartNum(){
    let list = getCartData();
    let total = 0;
    list.forEach(item=>total+=item.num);
    document.getElementById("cartCount").innerText = total;
}
function addToCart(pid,name,price,img){
    let cart = getCartData();
    let has = cart.find(v=>v.pid == pid);
    if(has){
        has.num += 1;
    }else{
        cart.push({
            pid:pid,
            name:name,
            price:Number(price),
            img:img||DEF_SMALL,
            num:1
        });
    }
    setCartData(cart);
    alert("成功加入購物車！");
}
function openCart(){
    document.querySelectorAll(".page-view").forEach(p=>p.classList.add("hide"));
    document.getElementById("page-cart").classList.remove("hide");
    renderCartPage();
}
function renderCartPage(){
    let cart = getCartData();
    let emptyTip = document.getElementById("cartEmptyTip");
    let box = document.getElementById("cartListBox");
    if(cart.length === 0){
        emptyTip.style.display = "block";
        box.innerHTML = "";
        return;
    }
    emptyTip.style.display = "none";
    let html = "";
    let allTotal = 0;
    cart.forEach((item,idx)=>{
        let sub = item.price * item.num;
        allTotal += sub;
        html += `
        <div class="cart-item">
            <img class="cart-img" src="${item.img}" onerror="this.src='${DEF_SMALL}'">
            <div style="flex:1">
                <div style="font-weight:bold">${item.name}</div>
                <div style="color:#f53f3f">NT$${item.price}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
                <button class="num-btn" onclick="cartMinus(${idx})">-</button>
                <span>${item.num}</span>
                <button class="num-btn" onclick="cartPlus(${idx})">+</button>
            </div>
            <span style="width:80px;text-align:right;font-weight:bold">${sub}元</span>
            <i class="fa fa-trash" style="color:#f53f3f;cursor:pointer" onclick="cartDel(${idx})"></i>
        </div>
        `;
    });
    html += `
    <div class="total-bar">
        <div>總金額：<span style="color:#f53f3f;font-size:20px;font-weight:bold">${allTotal}</span> 元</div>
        <div style="display:flex;gap:10px">
            <button class="clear-cart" onclick="clearAllLocalCart()">清空購物車</button>
            <button class="checkout" onclick="goCheckout()">結帳下單</button>
        </div>
    </div>
    `;
    box.innerHTML = html;
}
function cartPlus(idx){
    let cart = getCartData();
    cart[idx].num++;
    setCartData(cart);
    renderCartPage();
}
function cartMinus(idx){
    let cart = getCartData();
    if(cart[idx].num > 1){
        cart[idx].num--;
        setCartData(cart);
        renderCartPage();
    }
}
function cartDel(idx){
    let cart = getCartData();
    cart.splice(idx,1);
    setCartData(cart);
    renderCartPage();
}
function clearAllLocalCart(){
    if(!confirm("確定清空所有購物車商品？"))return;
    setCartData([]);
    renderCartPage();
}

// ========== 首頁商品與分類 ==========
let allGoods = [];
async function loadCategory(){
    let {data} = await sb.from("categories").select("*");
    let h = `<span class="cate-tag" onclick="filterGoods('all')">全部分類</span>`;
    data.forEach(item=>h+=`<span class="cate-tag" onclick="filterGoods(${item.id})">${item.name}</span>`);
    document.getElementById("cateHtml").innerHTML = h;
}
async function loadGoods(){
    let {data} = await sb.from("products").select("*,categories(name)");
    allGoods = data;
    renderGoods(allGoods);
}
function renderGoods(list){
    let h = "";
    list.forEach(g=>{
        let img = g.img || DEF_IMG;
        h += `
        <div class="product-card">
            <img class="product-img" src="${img}" onerror="this.src='${DEF_IMG}'">
            <div class="product-name">${g.name}</div>
            <div class="product-cate">${g.categories?.name||"未分類"}</div>
            <div class="product-price">NT$${g.price}</div>
            <div style="font-size:13px;color:#888">庫存：${g.stock}</div>
            <button class="add-cart" onclick="addToCart(${g.id},'${g.name}',${g.price},'${g.img||''}')">加入購物車</button>
        </div>
        `;
    });
    document.getElementById("productHtml").innerHTML = h;
}
function filterGoods(cid){
    if(cid === "all") return renderGoods(allGoods);
    renderGoods(allGoods.filter(v=>v.cate_id == cid));
}

// ========== 頁面切換 ==========
function switchPage(page){
    document.querySelectorAll(".page-view").forEach(p=>p.classList.add("hide"));
    document.getElementById("page-"+page).classList.remove("hide");
    if(page == "home"){
        loadCategory();
        loadGoods();
    }
    if(page == "admin"){
        if(!localStorage.getItem("shopUserInfo")){
            alert("請先登入會員");
            switchPage("home");
            return;
        }
        loadAdminAll();
    }
}
function adminTabChange(t,d){
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    d.classList.add("active");
    document.querySelectorAll(".admin-content").forEach(c=>c.classList.add("hide"));
    document.getElementById("admin-"+t).classList.remove("hide");
}

// ========== 會員登入註冊 ==========
async function userRegister(){
    let email = document.getElementById("regEmail").value.trim();
    let pwd = document.getElementById("regPwd").value.trim();
    if(!email||!pwd)return alert("請填寫完整資訊");
    let {error} = await sb.auth.signUp({email,password:pwd});
    if(error)return alert(error.message);
    alert("註冊成功，請登入");
    closeModal("regModal");openLoginModal();
}
async function userLogin(){
    let email = document.getElementById("loginEmail").value.trim();
    let pwd = document.getElementById("loginPwd").value.trim();
    if(!email||!pwd)return alert("請輸入帳號密碼");
    let {data,error} = await sb.auth.signInWithPassword({email,password:pwd});
    if(error)return alert(error.message);
    localStorage.setItem("shopUserInfo",JSON.stringify(data.user));
    closeModal("loginModal");
    refreshUserStatus();
    alert("登入成功");
}
function refreshUserStatus(){
    let u = localStorage.getItem("shopUserInfo");
    if(u){
        document.getElementById("regBtn").style.display="none";
        document.getElementById("loginBtn").style.display="none";
        document.getElementById("userText").style.display="block";
        document.getElementById("userText").innerText = JSON.parse(u).email;
        document.getElementById("adminEntrance").style.display="block";
    }else{
        document.getElementById("regBtn").style.display="inline-block";
        document.getElementById("loginBtn").style.display="inline-block";
        document.getElementById("userText").style.display="none";
        document.getElementById("adminEntrance").style.display="none";
    }
}
function openRegModal(){document.getElementById("regModal").classList.remove("hide");}
function openLoginModal(){document.getElementById("loginModal").classList.remove("hide");}
function closeModal(id){document.getElementById(id).classList.add("hide");}

// ========== 後台分類功能：新增/編輯/刪除 ==========
async function loadAdminCate(){
    let {data} = await sb.from("categories").select("*").order("id");
    let html = "";
    data.forEach(item=>{
        html += `
        <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee;">
            <span>${item.name}</span>
            <div>
                <button class="edit" onclick="editCate(${item.id},'${item.name}')">編輯</button>
                <button class="del" onclick="delCate(${item.id})">刪除</button>
            </div>
        </div>
        `;
    });
    document.getElementById("adminCateBody").innerHTML = html;
}
function openAddCategory(){
    document.getElementById("cateModalTitle").innerText = "新增商品分類";
    document.getElementById("editCateId").value = "";
    document.getElementById("cateNameInput").value = "";
    document.getElementById("categoryModal").classList.remove("hide");
}
async function saveCategoryInfo(){
    let cid = document.getElementById("editCateId").value;
    let name = document.getElementById("cateNameInput").value.trim();
    if(!name) return alert("請輸入分類名稱");
    if(cid){
        await sb.from("categories").update({name:name}).eq("id",cid);
    }else{
        await sb.from("categories").insert({name:name});
    }
    closeModal("categoryModal");
    loadAdminCate();
    loadCategory();
    alert("儲存成功");
}
function editCate(id,name){
    document.getElementById("cateModalTitle").innerText = "編輯分類";
    document.getElementById("editCateId").value = id;
    document.getElementById("cateNameInput").value = name;
    document.getElementById("categoryModal").classList.remove("hide");
}
async function delCate(id){
    if(!confirm("確定刪除此分類？"))return;
    await sb.from("categories").delete().eq("id",id);
    loadAdminCate();
    loadCategory();
}

// ========== 後台商品功能：新增/編輯/刪除 ==========
async function loadAdminGoods(){
    let {data} = await sb.from("products").select("*,categories(name)").order("id");
    let html = "";
    data.forEach(item=>{
        let img = item.img || DEF_SMALL;
        html += `
        <tr>
            <td><img src="${img}" style="width:40px;height:40px;border-radius:4px;" onerror="this.src='${DEF_SMALL}'"></td>
            <td>${item.name}</td>
            <td>${item.categories?.name||"未分類"}</td>
            <td>${item.price}</td>
            <td>${item.stock}</td>
            <td>
                <button class="edit" onclick="editGoods(${item.id})">編輯</button>
                <button class="del" onclick="delGoods(${item.id})">刪除</button>
            </td>
        </tr>
        `;
    });
    document.getElementById("adminProductBody").innerHTML = html;
}
async function fillCateSelect(){
    let {data} = await sb.from("categories").select("*");
    let opt = "<option value=''>請選擇分類</option>";
    data.forEach(item=>opt += `<option value="${item.id}">${item.name}</option>`);
    document.getElementById("prodCateSelect").innerHTML = opt;
}
function openAddProduct(){
    document.getElementById("prodModalTitle").innerText = "新增商品";
    document.getElementById("editProductId").value = "";
    document.getElementById("prodName").value = "";
    document.getElementById("prodPrice").value = "";
    document.getElementById("prodStock").value = "";
    document.getElementById("prodImgUrl").value = "";
    document.getElementById("prodDesc").value = "";
    fillCateSelect();
    document.getElementById("productModal").classList.remove("hide");
}
async function editGoods(pid){
    document.getElementById("prodModalTitle").innerText = "編輯商品";
    let {data} = await sb.from("products").select("*").eq("id",pid).single();
    document.getElementById("editProductId").value = pid;
    document.getElementById("prodName").value = data.name;
    document.getElementById("prodPrice").value = data.price;
    document.getElementById("prodStock").value = data.stock;
    document.getElementById("prodImgUrl").value = data.img||"";
    document.getElementById("prodDesc").value = data.goods_desc||"";
    await fillCateSelect();
    document.getElementById("prodCateSelect").value = data.cate_id||"";
    document.getElementById("productModal").classList.remove("hide");
}
async function saveProductInfo(){
    let pid = document.getElementById("editProductId").value;
    let name = document.getElementById("prodName").value.trim();
    let cate_id = document.getElementById("prodCateSelect").value;
    let price = Number(document.getElementById("prodPrice").value);
    let stock = Number(document.getElementById("prodStock").value);
    let img = document.getElementById("prodImgUrl").value.trim();
    let goods_desc = document.getElementById("prodDesc").value.trim();
    if(!name||!cate_id||!price||!stock){
        return alert("請填寫完整商品資訊");
    }
    let postData = {
        name,name,cate_id,price,stock,img,goods_desc
    };
    if(pid){
        await sb.from("products").update(postData).eq("id",pid);
    }else{
        await sb.from("products").insert(postData);
    }
    closeModal("productModal");
    loadAdminGoods();
    loadGoods();
    alert("商品儲存成功");
}
async function delGoods(pid){
    if(!confirm("確定刪除此商品？"))return;
    await sb.from("products").delete().eq("id",pid);
    loadAdminGoods();
    loadGoods();
}

// ========== 後台訂單功能 ==========
async function loadAdminOrder(){
    let {data} = await sb.from("orders").select("*").order("created_at",{asc:false});
    let html = "";
    if(!data.length){
        document.getElementById("adminOrderBody").innerHTML = `<tr><td colspan="6" style="text-align:center">暫無訂單</td></tr>`;
        return;
    }
    for(let o of data){
        let userInfo = await sb.auth.getUser(o.user_id);
        let mail = userInfo.data.user?.email||"未知會員";
        let stText = o.status=="pending"?"待發貨":"已完成";
        html += `
        <tr>
            <td>${o.order_no}</td>
            <td>${mail}</td>
            <td>${o.total_price}元</td>
            <td>${stText}</td>
            <td>${new Date(o.created_at).toLocaleString()}</td>
            <td><button class="edit" onclick="showOrderDetail(${o.id})">查看明細</button></td>
        </tr>
        `;
    }
    document.getElementById("adminOrderBody").innerHTML = html;
}
async function showOrderDetail(oid){
    let {data:order} = await sb.from("orders").select("*").eq("id",oid).single();
    let {data:items} = await sb.from("order_items").select("*").eq("order_id",oid);
    let content = `<p>訂單編號：${order.order_no}</p><p>訂單金額：${order.total_price} 元</p><hr>`;
    items.forEach(i=>{
        content += `<p>${i.product_name}  ×${i.num}  單價：${i.price}</p>`;
    });
    document.getElementById("orderDetailContent").innerHTML = content;
    document.getElementById("orderDetailModal").classList.remove("hide");
}

// ========== 結帳功能 ==========
async function goCheckout(){
    if(!localStorage.getItem("shopUserInfo"))return alert("請先登入會員");
    let cart = getCartData();
    if(cart.length===0)return alert("購物車無商品");
    let total = cart.reduce((s,i)=>s+i.price*i.num,0);
    let orderNo = "ORD"+Date.now();
    let user = JSON.parse(localStorage.getItem("shopUserInfo"));
    let {data:oRes} = await sb.from("orders").insert({
        order_no:orderNo,
        user_id:user.id,
        total_price:total,
        status:"pending"
    }).select();
    let oid = oRes[0].id;
    let items = cart.map(i=>({
        order_id:oid,
        product_id:i.pid,
        product_name:i.name,
        price:i.price,
        num:i.num
    }));
    await sb.from("order_items").insert(items);
    alert("下單成功！訂單編號："+orderNo);
    setCartData([]);
    openCart();
}

// 後台一次性載入
async function loadAdminAll(){
    await loadAdminGoods();
    await loadAdminCate();
    await loadAdminOrder();
}

// 初始載入
window.onload = function(){
    updateCartNum();
    refreshUserStatus();
    switchPage("home");
}
