<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物商城 | 線上購物平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme:{
                extend:{
                    colors:{
                        main:'#e53e3e'
                    }
                }
            }
        }
    </script>
    <style>
        .cart-badge{position:relative;top:-10px;left:-8px;}
        .product-card:hover{transform:translateY(-5px);box-shadow:0 10px 25px #0002;}
    </style>
</head>
<body class="bg-gray-50">
    <!-- 導覽列 -->
    <header class="bg-white shadow sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#" class="text-2xl font-bold text-main">線上商城</a>
            <div class="flex items-center gap-6">
                <a href="#shop" class="hidden md:block">全部商品</a>
                <a href="#cart" class="text-xl">
                    <i class="fa fa-shopping-cart"></i>
                    <span class="cart-badge bg-main text-white text-xs px-2 rounded-full" id="cartNum">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- 輪播廣告 -->
    <section class="bg-gradient-to-r from-red-500 to-orange-400 text-white py-16">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-[clamp(2rem,5vw,3rem)] font-bold">優質好物 輕鬆選購</h1>
            <p class="mt-4 text-lg">快速下單｜安心出貨｜售後保障</p>
            <a href="#shop" class="inline-block mt-6 bg-white text-red-500 px-8 py-3 rounded-full font-bold">立即選購</a>
        </div>
    </section>

    <!-- 商品列表 -->
    <section id="shop" class="py-16 container mx-auto px-4">
        <h2 class="text-3xl font-bold text-center mb-10">熱門商品</h2>
        <div class="grid grid-cols-1 sm:cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="productList">
            <div class="col-span-full text-center py-20 text-gray-500">
                <i class="fa fa-spinner fa-spin text-3xl"></i>
                <p class="mt-2">載入商品中...</p>
            </div>
        </div>
    </section>

    <!-- 購物車 -->
    <section id="cart" class="py-16 bg-white">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold text-center mb-10">我的購物車</h2>
            <div id="cartBox">
                <p class="text-center text-gray-500 py-10">購物車暫無商品</p>
            </div>
            <div class="max-w-xl mx-auto mt-10 bg-gray-50 p-6 rounded-lg hidden" id="orderForm">
                <h3 class="text-xl font-bold mb-4">填寫訂單資料</h3>
                <input type="text" id="userName" placeholder="真實姓名" class="w-full border p-3 rounded mb-3">
                <input type="text" id="userPhone" placeholder="聯絡電話" class="w-full border p-3 rounded mb-3">
                <textarea id="userAddr" placeholder="收件地址" class="w-full border p-3 rounded mb-3"></textarea>
                <p class="text-lg font-bold mb-4">總金額：<span id="totalMoney">0</span> 元</p>
                <button onclick="submitOrder()" class="w-full bg-main text-white py-3 rounded font-bold">提交訂單</button>
            </div>
        </div>
    </section>

    <!-- 頁尾 -->
    <footer class="bg-gray-800 text-white py-10">
        <div class="container mx-auto px-4 text-center">
            <p>© 2026 購物商城 版權所有 | 後台管理連線 Supabase</p>
        </div>
    </footer>

    <script>
        // 你的 Supabase 金鑰
        const SUPABASE_URL = "https://jbyvwgugkvnuggwxxeqk.supabase.co";
        const SUPABASE_KEY = "sb_publishable_-iXsLlQwcN7MDQRF6qh4iA_a15CGAMs";
        const { createClient } = supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // 購物車本地儲存
        let cart = JSON.parse(localStorage.getItem("shopCart")) || [];

        // 初始化
        window.onload = function(){
            loadProducts();
            renderCartNum();
            renderCart();
        }

        // 載入所有商品
        async function loadProducts(){
            const {data,error} = await supabase.from("products").select("*");
            if(error){
                document.getElementById("productList").innerHTML = `<p class="text-red-500 col-span-full text-center">商品載入失敗</p>`;
                return;
            }
            let html = "";
            data.forEach(item=>{
                html += `
                <div class="product-card bg-white rounded-lg overflow-hidden shadow transition-all duration-300">
                    <img src="${item.image||'https://picsum.photos/400/300'}" class="w-full h-48 object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">${item.name}</h3>
                        <p class="text-main text-xl font-bold mt-2">NT$ ${item.price}</p>
                        <p class="text-gray-400 text-sm mt-1">庫存：${item.stock}</p>
                        <button onclick="addCart('${item.id}','${item.name}',${item.price},'${item.image||''}')"
                        class="w-full mt-4 bg-main text-white py-2 rounded">加入購物車</button>
                    </div>
                </div>
                `
            })
            document.getElementById("productList").innerHTML = html;
        }

        // 加入購物車
        function addCart(id,name,price,img){
            let find = cart.find(v=>v.id===id);
            if(find){
                find.num +=1;
            }else{
                cart.push({id,name,price,img,num:1})
            }
            saveCart();
            renderCartNum();
            renderCart();
            alert("已加入購物車！");
        }

        // 儲存購物車
        function saveCart(){
            localStorage.setItem("shopCart",JSON.stringify(cart));
        }

        // 更新購物車數量角標
        function renderCartNum(){
            let total = cart.reduce((sum,item)=>sum+item.num,0);
            document.getElementById("cartNum").innerText = total;
        }

        // 渲染購物車頁面
        function renderCart(){
            if(cart.length===0){
                document.getElementById("cartBox").innerHTML = `<p class="text-center text-gray-500 py-10">購物車暫無商品</p>`;
                document.getElementById("orderForm").classList.add("hidden");
                return;
            }
            let html = "";
            let total = 0;
            cart.forEach((item,idx)=>{
                total += item.price * item.num;
                html += `
                <div class="flex items-center border-b py-4 gap-4">
                    <img src="${item.img||'https://picsum.photos/100/100'}" class="w-20 h-20 object-cover rounded">
                    <div class="flex-1">
                        <h4 class="font-bold">${item.name}</h4>
                        <p class="text-main">NT$ ${item.price}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeNum(${idx},-1)" class="w-8 h-8 border rounded">-</button>
                        <span>${item.num}</span>
                        <button onclick="changeNum(${idx},1)" class="w-8 h-8 border rounded">+</button>
                    </div>
                    <button onclick="delCart(${idx})" class="text-red-500"><i class="fa fa-trash"></i></button>
                </div>
                `
            })
            document.getElementById("cartBox").innerHTML = html;
            document.getElementById("totalMoney").innerText = total;
            document.getElementById("orderForm").classList.remove("hidden");
        }

        // 修改數量
        function changeNum(idx,type){
            cart[idx].num += type;
            if(cart[idx].num<=0) cart.splice(idx,1);
            saveCart();
            renderCartNum();
            renderCart();
        }

        // 刪除商品
        function delCart(idx){
            cart.splice(idx,1);
            saveCart();
            renderCartNum();
            renderCart();
        }

        // 提交訂單存入 Supabase
        async function submitOrder(){
            let name = document.getElementById("userName").value.trim();
            let phone = document.getElementById("userPhone").value.trim();
            let addr = document.getElementById("userAddr").value.trim();
            let total = parseInt(document.getElementById("totalMoney").innerText);
            if(!name||!phone||!addr) return alert("請填寫完整收件資料");

            const {error} = await supabase.from("orders").insert([{
                username:name,
                phone:phone,
                address:addr,
                total_price:total,
                items:cart
            }])
            if(error){
                alert("訂單提交失敗："+error.message);
                return;
            }
            alert("訂單提交成功！感謝購買");
            cart = [];
            saveCart();
            renderCartNum();
            renderCart();
            document.getElementById("userName").value = "";
            document.getElementById("userPhone").value = "";
            document.getElementById("userAddr").value = "";
        }
    </script>
</body>
</html>
