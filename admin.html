<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家後台 - 訂單管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <header class="bg-white shadow px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold">商家訂單管理後台</h1>
        <div>
            <span id="adminName"></span>
            <button onclick="adminLogout()" class="ml-4 text-red-500">登出</button>
            <a href="index.html" class="ml-4 text-blue-500">返回前台</a>
        </div>
    </header>

    <main class="container mx-auto p-6">
        <div class="bg-white rounded-lg shadow p-4 mb-6 flex gap-4">
            <button onclick="getAllOrder()" class="px-4 py-2 bg-red-500 text-white rounded">全部訂單</button>
            <button onclick="filterOrder('待發貨')" class="px-4 py-2 border rounded">待發貨</button>
            <button onclick="filterOrder('已出貨')" class="px-4 py-2 border rounded">已出貨</button>
            <button onclick="filterOrder('已完成')" class="px-4 py-2 border rounded">已完成</button>
        </div>

        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-200">
                    <tr>
                        <th class="p-3 text-left">訂單編號</th>
                        <th class="p-3 text-left">購買人</th>
                        <th class="p-3 text-left">電話</th>
                        <th class="p-3 text-left">總金額</th>
                        <th class="p-3 text-left">狀態</th>
                        <th class="p-3 text-left">下單時間</th>
                        <th class="p-3 text-left">操作</th>
                    </tr>
                </thead>
                <tbody id="orderTable">
                    <tr><td colspan="7" class="text-center p-10">載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://jbyvwgugkvnuggwxxeqk.supabase.co";
        const SUPABASE_KEY = "sb_publishable_-iXsLlQwcN7MDQRF6qh4iA_a15CGAMs";
        const { createClient } = supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let loginUser = JSON.parse(localStorage.getItem("shopUser")) || null;

        window.onload = function(){
            if(!loginUser || loginUser.role !== "admin"){
                alert("無權限進入商家後台，請使用管理員帳號登入");
                location.href="index.html";
                return;
            }
            document.getElementById("adminName").innerText = "管理員："+loginUser.nickname||loginUser.account;
            getAllOrder();
        }

        async function getAllOrder(){
            const {data} = await supabase.from("orders").select("*").order("created_at",{asc:false});
            renderOrder(data);
        }
        async function filterOrder(status){
            const {data} = await supabase.from("orders").select("*").eq("status",status).order("created_at",{asc:false});
            renderOrder(data);
        }

        function renderOrder(list){
            let html = "";
            if(list.length===0){
                html = `<tr><td colspan="7" class="text-center p-10">暫無訂單</td></tr>`;
            }
            list.forEach(item=>{
                let time = new Date(item.created_at).toLocaleString();
                html += `
                <tr class="border-t">
                    <td class="p-3">${item.id.slice(0,12)}...</td>
                    <td class="p-3">${item.username}</td>
                    <td class="p-3">${item.phone}</td>
                    <td class="p-3 font-bold">NT$ ${item.total_price}</td>
                    <td class="p-3">
                        <span class="px-2 py-1 rounded text-white text-xs
                        ${item.status==='待發貨'?'bg-orange-500':item.status==='已出貨'?'bg-blue-500':'bg-green-500'}">
                        ${item.status}
                        </span>
                    </td>
                    <td class="p-3">${time}</td>
                    <td class="p-3">
                        <select onchange="changeStatus('${item.id}',this.value)" class="border p-1">
                            <option value="待發貨" ${item.status==='待發貨'?'selected':''}>待發貨</option>
                            <option value="已出貨" ${item.status==='已出貨'?'selected':''}>已出貨</option>
                            <option value="已完成" ${item.status==='已完成'?'selected':''}>已完成</option>
                        </select>
                    </td>
                </tr>
                `
            })
            document.getElementById("orderTable").innerHTML=html;
        }

        async function changeStatus(oid,sta){
            await supabase.from("orders").update({status:sta}).eq("id",oid);
            alert("訂單狀態已更新");
            getAllOrder();
        }

        function adminLogout(){
            localStorage.removeItem("shopUser");
            location.href="index.html";
        }
    </script>
</body>
</html>
